The default units of measurement for the product model are as defined in the UNITS directive in the file
misc/info of the product model. If the default is not defined for the product model, the default is imperial.
For newly created files, units are based on the default defined for the product model.
For each file described in this document, there is a table of information. The UNITS row of the file
information table indicates whether the UNITS directive is required for that file:
<file_name>
Type One of these strings:
• Line Record Text
• Structured Text
Compression One of these strings:
• None
• Yes
Path Path to the file.
UNITS One of these strings:
• The UNITS directive is required.
• The UNITS directive is not relevant for the <file_name> file.
