How Measurements Are Stored
According to the unit of measurement selected, data is stored in these units:
Type of Data Metric (UNITS=MM) Imperial (UNITS=INCH)
area square mm square inch
copper weight µm
In metric units, copper weight is
actually copper thickness. The
application converts it accordingly
into commonly used neutral units
(thickness or weight).
ounce per square foot
