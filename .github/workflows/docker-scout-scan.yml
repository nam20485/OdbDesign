name: Docker Scout Scan

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Scans published Docker images instead of rebuilding (~90% time savings)
# Triggered after Docker Publish completes successfully, or weekly for CVE updates
on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
    branches: [development, staging, main, release]
  schedule:
    # Weekly scan on Sunday at midnight for new CVE updates
    - cron: "0 0 * * 0"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch tag to scan (e.g., main, development)"
        required: false
        default: "development"

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}
  # Use `latest` as the tag to compare to if empty, assuming that it's already pushed
  COMPARE_TAG: latest

permissions:
  contents: read

jobs:
  scan:
    name: Docker-Scout-Scan

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write

    # Only run if triggered manually, scheduled, OR if Docker Publish succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      # Determine which branch/tag to scan
      - name: Set Image Tag
        id: set-tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            # Sanitize branch name to prevent code injection
            BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"
            # Remove any characters that aren't alphanumeric, dash, underscore, or dot
            BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]//g')
            echo "SCAN_TAG=${BRANCH_NAME}-latest" >> $GITHUB_ENV
            echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "SCAN_TAG=${{ inputs.branch }}-latest" >> $GITHUB_ENV
            echo "BRANCH_NAME=${{ inputs.branch }}" >> $GITHUB_ENV
          else
            # Scheduled run - scan development by default
            echo "SCAN_TAG=development-latest" >> $GITHUB_ENV
            echo "BRANCH_NAME=development" >> $GITHUB_ENV
          fi

      # Login against Docker Hub to allow running Docker Scout
      - name: Log into Docker Hub registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Login to GHCR to pull the image
      - name: Log into GHCR registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Scan the published image directly (no rebuild needed - ~90% time savings)
      - name: Analyze Published Image for CVEs
        id: docker-scout-cves
        uses: docker/scout-action@b3dd3d6c420903eb3ff2812ac1b1d146ffb93a41 # v1.5.1
        with:
          command: cves,recommendations
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SCAN_TAG }}
          sarif-file: sarif.output.json
          summary: true

      - name: Upload SARIF result
        id: upload-sarif
        uses: github/codeql-action/upload-sarif@3c3833e0f8c1c83d449a7478aa59c036a9165498 # v3.29.11
        with:
          sarif_file: sarif.output.json

      # Compare against main branch image (if scanning non-main branch)
      - name: Check Compare Image Exists
        id: compare_image_exists
        if: env.BRANCH_NAME != 'main'
        continue-on-error: true
        run: |
          docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ env.COMPARE_TAG }} > /dev/null 2>&1

      - name: Docker Scout Compare to Main
        id: docker-scout-compare
        if: env.BRANCH_NAME != 'main' && steps.compare_image_exists.outcome == 'success'
        uses: docker/scout-action@b3dd3d6c420903eb3ff2812ac1b1d146ffb93a41 # v1.5.1
        with:
          command: compare
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SCAN_TAG }}
          to: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ env.COMPARE_TAG }}
          ignore-unchanged: true
          only-severities: critical,high
